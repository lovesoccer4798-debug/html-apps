<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Creator Studio — 素材から、各AIに渡せる高品質なプロンプトをつくるNESTのアプリ。">
<title>Creator Studio — NEST</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="top">
    <a class="back" href="../portal/"><svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> NEST Portal へ戻る</a>
    <div class="brand">
      <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.707 21.293a1 1 0 0 1-1.414 0l-1.586-1.586a1 1 0 0 1 0-1.414l5.586-5.586a1 1 0 0 1 1.414 0l1.586 1.586a1 1 0 0 1 0 1.414z"/><path d="m18 13-1.375-6.874a1 1 0 0 0-.746-.776L3.235 2.028a1 1 0 0 0-1.207 1.207L5.35 15.879a1 1 0 0 0 .776.746L13 18"/><path d="m2.3 2.3 7.286 7.286"/><circle cx="11" cy="11" r="2"/></svg>
      <h1>Creator Studio</h1>
    </div>
    <p class="subtitle">素材から、Claude・ChatGPT・Gemini などに渡せるプロンプトをつくる。</p>
  </div>
</header>

<main class="studio-grid">

  <!-- 左：作業 -->
  <div class="work-col">

    <section class="panel">
      <div class="panel-head">
        <span class="step-no">1</span>
        <h2><svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg> 素材</h2>
      </div>
      <div class="field">
        <label for="title"><svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v16"/><path d="M4 7V5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2"/><path d="M9 20h6"/></svg> タイトル（テーマ）</label>
        <input type="text" id="title" placeholder="例：はじめての副業で失敗した話">
      </div>
      <div class="field">
        <label for="body">エピソード本文</label>
        <textarea class="body-input" id="body" placeholder="出来事・考え・気づき、音声の文字起こしなどをそのまま貼り付けてください。整っていなくて大丈夫です。"></textarea>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <span class="step-no">2</span>
        <h2><svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12.296 3.464 3.02 3.956"/><path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3z"/><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="m6.18 5.276 3.1 3.899"/></svg> 媒体を選ぶ</h2>
        <span class="hint">今は1つ選択（将来は複数同時）</span>
      </div>
      <div class="media-grid" id="media"><!-- MEDIA[] から動的生成 --></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <span class="step-no">3</span>
        <h2><svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5H3"/><path d="M12 19H3"/><path d="M14 3v4"/><path d="M16 17v4"/><path d="M21 12h-9"/><path d="M21 19h-5"/><path d="M21 5h-7"/><path d="M8 10v4"/><path d="M8 12H3"/></svg> 仕上げの設定</h2>
        <span class="hint">次回も自動で復元されます</span>
      </div>
      <div class="settings-grid" id="settings-fields"><!-- SETTINGS[] から動的生成 --></div>
      <div class="toggles" id="settings-toggles"><!-- SETTINGS[]（type:toggle）から動的生成 --></div>
    </section>

    <button class="generate" id="generate"><svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg> プロンプトを生成</button>
  </div>

  <!-- 右：結果 -->
  <div class="result-col">
    <section class="panel result-panel">
      <div class="panel-head">
        <span class="step-no">4</span>
        <h2><svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg> 生成プロンプト</h2>
      </div>
      <textarea class="out" id="out" readonly placeholder="ここに、各AIへ貼れるプロンプトが表示されます。&#10;&#10;左で素材と設定を入力して「プロンプトを生成」を押してください。"></textarea>
      <div class="result-actions">
        <button class="copy-btn" id="copy"><svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> <span class="copy-label">コピー</span></button>
        <span class="paste-hint">コピーして、お好みのAIに貼ってください</span>
      </div>
    </section>
  </div>

</main>

<footer>
  <p>Made in NEST — <strong>AT-Labo</strong></p>
</footer>

<script src="app.js"></script>
</body>
</html>

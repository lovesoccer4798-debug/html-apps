# 最小CI — ルール遵守をAIの善意ではなく機械的に保証する（docs/adr/20260707-minimal-ci-enforcement.md）
# 意図的に2ジョブのみに絞っている。ジョブを増やす場合はADRを残すこと。
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: 秘密情報スキャン (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  link-check:
    name: Markdownリンク切れチェック (lychee, オフライン)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # --offline: リポジトリ内の相対リンクのみ検証（外部URLの死活で落とさない・実行が数秒で済む）
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress "**/*.md"
          fail: true
